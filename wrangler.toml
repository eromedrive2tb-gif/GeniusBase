name = "genius-base"
main = "Root/Engine/src/index.tsx"
compatibility_date = "2024-04-01"

# Environment Variables
[vars]
NODE_ENV = "development"
# ⚠️  DEV ONLY — for production use:
#   wrangler secret put ADMIN_JWT_SECRET
#   wrangler secret put ENDUSER_JWT_SECRET
ADMIN_JWT_SECRET = "admin-dev-secret-change-me-in-production-min-32!!"
ENDUSER_JWT_SECRET = "enduser-dev-secret-change-me-in-production-min-32!"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "genius-base-db"
database_id = "REPLACE_WITH_D1_ID"
migrations_dir = "Root/Engine/src/db/migrations"

# KV Namespace Binding
[[kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_KV_ID"

# R2 Bucket Binding
[[r2_buckets]]
binding = "R2_STORAGE"
bucket_name = "genius-base-storage"

# Durable Objects Binding
[[durable_objects.bindings]]
name = "REALTIME_STATE"
class_name = "RealtimeState"

[[durable_objects.bindings]]
name = "DASHBOARD_RPC_STATE"
class_name = "DashboardRPCState"

# Durable Objects Migrations
[[migrations]]
tag = "v1"
new_classes = ["RealtimeState", "DashboardRPCState"]

# Observability
[observability]
enabled = true

# Module rules — treat CSS as text for static serving
[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

# Treat Dashboard client-side scripts as text for static serving
[[rules]]
type = "Text"
globs = ["**/Dashboard/src/scripts/*.js"]
fallthrough = false
